name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, intl, pdo, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config << EOF
          Host deploy-target
            HostName $SSH_HOST
            Port $SSH_PORT
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='storage/app' \
            --exclude='storage/framework/cache' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            --exclude='storage/logs' \
            --exclude='tests' \
            -e "ssh -p ${{ secrets.SSH_PORT || 22 }} -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Run post-deploy tasks
        env:
          PHP_BIN: ${{ secrets.PHP_BIN || 'php' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "PHP_BIN='${PHP_BIN}' DEPLOY_PATH='${DEPLOY_PATH}' bash -s" << 'EOF'
            set -e
            cd "$DEPLOY_PATH"
            "$PHP_BIN" -v
            "$PHP_BIN" artisan down --render="errors::503" || true
            "$PHP_BIN" artisan migrate --force
            "$PHP_BIN" artisan config:cache
            "$PHP_BIN" artisan route:cache
            "$PHP_BIN" artisan view:cache
            "$PHP_BIN" artisan event:cache
            "$PHP_BIN" artisan storage:link || true
            "$PHP_BIN" artisan up
          EOF

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_ed25519
